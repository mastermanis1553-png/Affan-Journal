<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affan's Pro Journal v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --sidebar: #161b22; --border: #30363d; --card: #0d1117;
            --primary: #58a6ff; --success: #3fb950; --danger: #f85149; --warning: #d29922;
            --text: #c9d1d9; --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Toggle for Mobile */
        .mobile-nav { display: none; position: fixed; top: 15px; left: 15px; z-index: 1100; background: var(--primary); color: #000; padding: 8px; border-radius: 4px; cursor: pointer; }

        /* Sidebar */
        aside { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .brand { color: var(--primary); font-weight: 800; font-size: 16px; margin-bottom: 30px; letter-spacing: 1px; text-align: center; }
        .nav-item { padding: 12px; border-radius: 6px; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; gap: 10px; font-size: 14px; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: #21262d; color: var(--primary); }

        /* Main Area */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; gap: 20px; }
        
        /* Top Navigation (Like Image) */
        .top-nav { display: flex; align-items: center; justify-content: space-between; background: var(--sidebar); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); }
        .tabs { display: flex; gap: 20px; }
        .tab { color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; padding: 5px 10px; border-radius: 4px; }
        .tab.active { color: #fff; background: #30363d; }
        .actions { display: flex; gap: 15px; align-items: center; }
        .btn-icon { color: var(--text-dim); cursor: pointer; font-size: 14px; }
        .btn-trade { background: #fff; color: #000; padding: 6px 15px; border-radius: 4px; font-weight: 600; font-size: 12px; border: none; cursor: pointer; }

        /* Summary Section (The Matrix) */
        .table-container { background: var(--sidebar); border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; padding: 10px; }
        .matrix-header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .matrix-view-btn { background: #21262d; color: var(--text-dim); padding: 5px 10px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border); }

        .pro-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 800px; }
        .pro-table th { padding: 12px; border: 1px solid var(--border); text-align: center; background: #161b22; color: var(--text-dim); }
        .pro-table td { padding: 10px; border: 1px solid var(--border); text-align: center; }
        .label-cell { text-align: left !important; background: #161b22; color: var(--text-dim); font-weight: 600; width: 200px; }
        
        /* Colors from Image */
        .win { color: var(--success); }
        .loss { color: var(--danger); }
        .be { color: var(--warning); }
        .highlight-row { background: #1c2128; font-weight: 700; }

        /* Trade Form */
        .form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; background: var(--sidebar); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; font-size: 12px; width: 100%; }

        @media (max-width: 768px) {
            aside { position: fixed; left: -240px; height: 100%; }
            aside.open { left: 0; }
            .mobile-nav { display: block; }
            .top-nav { flex-direction: column; gap: 10px; margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="mobile-nav" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <aside id="sidebar">
        <div class="brand">CHAMPION OS v4.0</div>
        <div class="nav-item active" onclick="show('sum')"><i class="fas fa-table"></i> Summary</div>
        <div class="nav-item" onclick="show('logs')"><i class="fas fa-list"></i> Trade Logs</div>
        <div class="nav-item" onclick="show('set')"><i class="fas fa-cog"></i> Settings</div>
    </aside>

    <main>
        <!-- Top Nav - Exactly like Image -->
        <div class="top-nav">
            <div class="tabs">
                <div class="tab">Monthly</div>
                <div class="tab active">Quarterly</div>
                <div class="tab">Yearly</div>
            </div>
            <div class="actions">
                <i class="fas fa-question-circle btn-icon"></i> Help
                <i class="fas fa-file-export btn-icon" onclick="exportData()"></i> Export
                <i class="fas fa-cog btn-icon"></i> Settings
                <button class="btn-trade" onclick="show('logs')">+ Trade</button>
            </div>
        </div>

        <!-- Summary Section (A-Z Image Match) -->
        <section id="sum" class="section">
            <div class="table-container">
                <div class="matrix-header">
                    <button class="matrix-view-btn">Metrics View (R Based) <i class="fas fa-chevron-down"></i></button>
                    <span style="font-size: 12px; color: var(--text-dim);">Sample Journal</span>
                </div>
                <table class="pro-table">
                    <thead>
                        <tr id="qHeader">
                            <th class="label-cell">Quarters</th>
                            <!-- Quarters will be injected -->
                        </tr>
                    </thead>
                    <tbody id="matrixBody">
                        <!-- Image Rows will be injected -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Trade Logs -->
        <section id="logs" class="section" style="display:none">
            <div class="form-box">
                <input type="date" id="date">
                <input type="text" id="sym" placeholder="Symbol">
                <input type="number" id="ent" placeholder="Entry">
                <input type="number" id="sl" placeholder="SL">
                <input type="number" id="tg" placeholder="Target">
                <button class="btn-trade" onclick="addTrade()">Record</button>
            </div>
            <div class="table-container" style="margin-top:15px">
                <table class="pro-table">
                    <thead>
                        <tr>
                            <th>Date</th><th>Symbol</th><th>Pos. Size (₹)</th><th>Qty</th><th>Status</th><th>R</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </section>

        <!-- Settings -->
        <section id="set" class="section" style="display:none">
            <div class="form-box" style="max-width:300px">
                <label style="font-size:12px">Risk Per Trade (₹)</label>
                <input type="number" id="cfgR" value="1000">
                <button class="btn-trade" onclick="saveSet()">Save</button>
            </div>
        </section>
    </main>

    <script>
        let trades = JSON.parse(localStorage.getItem('affan_db_v4')) || [];
        let riskR = localStorage.getItem('affan_risk_v4') || 1000;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            refresh();
        }

        function addTrade() {
            const date = document.getElementById('date').value;
            const sym = document.getElementById('sym').value.toUpperCase();
            const ent = parseFloat(document.getElementById('ent').value);
            const sl = parseFloat(document.getElementById('sl').value);
            const tg = parseFloat(document.getElementById('tg').value);
            if(!sym || !ent || !sl) return;

            const qty = Math.floor(riskR / (ent - sl));
            trades.push({ id: Date.now(), date, sym, ent, sl, tg, qty, status: 'Open', exit: 0, r: 0, isRF: false, origSL: sl });
            save();
        }

        function toggleRF(id) {
            const t = trades.find(t => t.id === id);
            t.isRF = !t.isRF;
            t.sl = t.isRF ? t.ent : t.origSL;
            save();
        }

        function closeTrade(id) {
            const exit = parseFloat(prompt("Exit Price?"));
            if(isNaN(exit)) return;
            const t = trades.find(t => t.id === id);
            t.exit = exit;
            t.r = (exit - t.ent) / (t.ent - t.origSL);
            t.status = t.r > 0.1 ? 'Win' : (t.r < -0.1 ? 'Loss' : 'BE');
            save();
        }

        function save() { localStorage.setItem('affan_db_v4', JSON.stringify(trades)); refresh(); }
        function saveSet() { riskR = document.getElementById('cfgR').value; localStorage.setItem('affan_risk_v4', riskR); refresh(); }

        function refresh() {
            const logBody = document.getElementById('logBody');
            logBody.innerHTML = '';
            trades.forEach(t => {
                const posSize = t.qty * t.ent;
                logBody.innerHTML += `
                <tr>
                    <td>${t.date}</td><td>${t.sym}</td><td>₹${posSize.toLocaleString()}</td><td>${t.qty}</td>
                    <td><span class="${t.status==='Win'?'win':(t.status==='Loss'?'loss':'be')}">${t.status}</span></td>
                    <td class="${t.r>=0?'win':'loss'}">${t.r.toFixed(2)}R</td>
                    <td>
                        <button onclick="toggleRF(${t.id})" style="font-size:10px">${t.isRF?'Undo RF':'Risk Free'}</button>
                        <button onclick="closeTrade(${t.id})" style="font-size:10px">Close</button>
                    </td>
                </tr>`;
            });
            buildMatrix();
        }

        function buildMatrix() {
            const qData = {};
            trades.forEach(t => {
                const d = new Date(t.date);
                const q = "Q" + (Math.floor(d.getMonth()/3)+1) + " " + d.getFullYear();
                if(!qData[q]) qData[q] = { entered:0, open:0, closed:0, be:0, win:0, loss:0, sumW:0, sumL:0, totalR:0 };
                qData[q].entered++;
                if(t.status === 'Open') qData[q].open++;
                else {
                    qData[q].closed++;
                    if(t.status === 'Win') { qData[q].win++; qData[q].sumW += t.r; }
                    else if(t.status === 'Loss') { qData[q].loss++; qData[q].sumL += Math.abs(t.r); }
                    else qData[q].be++;
                    qData[q].totalR += t.r;
                }
            });

            const qSorted = Object.keys(qData).sort().reverse();
            document.getElementById('qHeader').innerHTML = '<th class="label-cell">Metrics View (R Based)</th>' + qSorted.map(q => `<th>${q}</th>`).join('');

            const rows = [
                { l: "Trades Entered", k: "entered" },
                { l: "Open Till Date", k: "open" },
                { l: "Trades Closed", k: "closed" },
                { l: "Breakeven", k: "be", c: "be" },
                { l: "Winners + Losers", f: q => qData[q].win + qData[q].loss },
                { l: "Winners", k: "win", c: "win" },
                { l: "Losers", k: "loss", c: "loss" },
                { l: "Win Rate", f: q => (qData[q].win / qData[q].closed * 100 || 0).toFixed(0) + "%" },
                { l: "Avg Loss (Losers)", f: q => "-" + (qData[q].sumL / qData[q].loss || 0).toFixed(2), c: "loss" },
                { l: "Avg Gain (Winners)", f: q => (qData[q].sumW / qData[q].win || 0).toFixed(2), c: "win" },
                { l: "Avg R Loss (Losers)", f: q => "-" + (qData[q].sumL / qData[q].loss || 0).toFixed(2), c: "loss" },
                { l: "Avg R Gain (Winners)", f: q => (qData[q].sumW / qData[q].win || 0).toFixed(2), c: "win" },
                { l: "ARR", f: q => ((qData[q].sumW / qData[q].win) / (qData[q].sumL / qData[q].loss) || 0).toFixed(2) },
                { l: "Avg R Loss (BE)", f: q => (0).toFixed(2), c: "be" },
                { l: "Trade Expectancy (in R)", f: q => (qData[q].totalR / qData[q].closed || 0).toFixed(2), c: "win" },
                { l: "Total R Gained", f: q => qData[q].totalR.toFixed(2), c: "win" },
                { l: "Average Risk R", f: q => riskR, isPro: true },
                { l: "Total Profit", f: q => "₹" + Math.floor(qData[q].totalR * riskR).toLocaleString(), isPro: true, c: "win" }
            ];

            const mBody = document.getElementById('matrixBody');
            mBody.innerHTML = rows.map(r => `
                <tr class="${r.isPro ? 'highlight-row' : ''}">
                    <td class="label-cell">${r.l}</td>
                    ${qSorted.map(q => `<td class="${r.c || ''}">${r.f ? r.f(q) : qData[q][r.k]}</td>`).join('')}
                </tr>
            `).join('');
        }

        function exportData() {
            let html = document.getElementById("sum").innerHTML;
            window.open('data:application/vnd.ms-excel,' + encodeURIComponent(html));
        }

        show('sum');
    </script>
</body>
</html>
