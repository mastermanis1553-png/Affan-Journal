
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affan's Pro Journal v5.0 | Formula Corrected</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --sidebar: #161b22; --border: #30363d;
            --primary: #58a6ff; --success: #3fb950; --danger: #f85149; --warning: #d29922;
            --text: #c9d1d9; --text-dim: #8b949e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .mobile-nav { display: none; position: fixed; top: 15px; left: 15px; z-index: 1100; background: var(--primary); color: #000; padding: 8px; border-radius: 4px; cursor: pointer; }
        aside { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        aside.closed { left: -240px; position: absolute; }
        .brand { color: var(--primary); font-weight: 800; font-size: 16px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .nav-item { padding: 12px; border-radius: 6px; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; gap: 10px; font-size: 14px; margin-bottom: 5px; }
        .nav-item.active { background: #21262d; color: var(--primary); }

        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; gap: 20px; }
        .top-nav { display: flex; align-items: center; justify-content: space-between; background: var(--sidebar); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border); }
        .tabs { display: flex; gap: 20px; }
        .tab { color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--primary); }

        .table-container { background: var(--sidebar); border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; padding: 15px; margin-bottom: 20px; }
        .pro-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
        .pro-table th { padding: 12px; border: 1px solid var(--border); background: #161b22; color: var(--text-dim); }
        .pro-table td { padding: 10px; border: 1px solid var(--border); text-align: center; }
        .label-cell { text-align: left !important; background: #161b22; color: var(--text-dim); font-weight: 600; width: 220px; }
        
        .win { color: var(--success); } .loss { color: var(--danger); } .be { color: var(--warning); }
        .highlight-row { background: #1c2128; font-weight: 700; border-top: 2px solid var(--border); }

        .form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: var(--sidebar); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; width: 100%; }
        .btn { background: #fff; color: #000; padding: 8px 15px; border-radius: 4px; font-weight: 600; border: none; cursor: pointer; }

        @media (max-width: 768px) {
            .mobile-nav { display: block; }
            aside { position: fixed; left: -240px; height: 100%; }
            aside.open { left: 0; }
        }
    </style>
</head>
<body>

    <div class="mobile-nav" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <aside id="sidebar">
        <div class="brand">AFFAN'S OS v5.0</div>
        <div class="nav-item active" onclick="show('sum')"><i class="fas fa-chart-bar"></i> Summary Page</div>
        <div class="nav-item" onclick="show('logs')"><i class="fas fa-stream"></i> Trade Logs</div>
        <div class="nav-item" onclick="show('set')"><i class="fas fa-cog"></i> Settings</div>
    </aside>

    <main>
        <div class="top-nav">
            <div class="tabs">
                <div class="tab">Monthly</div>
                <div class="tab active">Quarterly</div>
                <div class="tab">Yearly</div>
            </div>
            <div>
                <button class="btn" onclick="exportExcel()">Export XLS</button>
            </div>
        </div>

        <!-- Summary Section -->
        <section id="sum" class="section">
            <div class="table-container">
                <table class="pro-table" id="mainMatrix">
                    <thead>
                        <tr id="qHeader">
                            <th class="label-cell">Metrics View (R Based)</th>
                        </tr>
                    </thead>
                    <tbody id="matrixBody"></tbody>
                </table>
            </div>
        </section>

        <!-- Trade Logs -->
        <section id="logs" class="section" style="display:none">
            <div class="form-box">
                <input type="date" id="date">
                <input type="text" id="sym" placeholder="SYMBOL">
                <input type="number" id="ent" placeholder="ENTRY">
                <input type="number" id="sl" placeholder="SL">
                <input type="number" id="tg" placeholder="TARGET">
                <button class="btn" onclick="addTrade()" style="background:var(--primary); color:#000">Record</button>
            </div>
            <div class="table-container" style="margin-top:20px">
                <table class="pro-table">
                    <thead>
                        <tr>
                            <th>Date</th><th>Symbol</th><th>Pos. Size</th><th>Qty</th><th>Status</th><th>R-Earned</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </section>

        <!-- Settings -->
        <section id="set" class="section" style="display:none">
            <div class="form-box" style="max-width:300px">
                <label>Risk Per Trade (₹)</label>
                <input type="number" id="cfgR" value="1000">
                <button class="btn" onclick="saveSet()">Save Config</button>
            </div>
        </section>
    </main>

    <script>
        let trades = JSON.parse(localStorage.getItem('affan_db_v5')) || [];
        let riskR = parseFloat(localStorage.getItem('affan_risk_v5')) || 1000;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            refresh();
        }

        function addTrade() {
            const date = document.getElementById('date').value;
            const sym = document.getElementById('sym').value.toUpperCase();
            const ent = parseFloat(document.getElementById('ent').value);
            const sl = parseFloat(document.getElementById('sl').value);
            const tg = parseFloat(document.getElementById('tg').value);
            if(!sym || !ent || !sl) return;

            const qty = Math.floor(riskR / (ent - sl));
            trades.push({ id: Date.now(), date, sym, ent, sl, tg, qty, status: 'Open', exit: 0, r: 0, isRF: false, initialSL: sl });
            save();
        }

        function closeTrade(id) {
            const exit = parseFloat(prompt("Exit Price?"));
            if(isNaN(exit)) return;
            const t = trades.find(t => t.id === id);
            t.exit = exit;
            // Formula Corrected: R is based on the initial risk taken
            t.r = (exit - t.ent) / (t.ent - t.initialSL);
            
            if(t.r > 0.1) t.status = 'Win';
            else if(t.r < -0.1) t.status = 'Loss';
            else t.status = 'BE';
            save();
        }

        function toggleRF(id) {
            const t = trades.find(t => t.id === id);
            t.isRF = !t.isRF;
            t.sl = t.isRF ? t.ent : t.initialSL;
            save();
        }

        function save() { localStorage.setItem('affan_db_v5', JSON.stringify(trades)); refresh(); }
        function saveSet() { riskR = document.getElementById('cfgR').value; localStorage.setItem('affan_risk_v5', riskR); refresh(); }

        function refresh() {
            const logBody = document.getElementById('logBody');
            logBody.innerHTML = '';
            trades.forEach(t => {
                const posSize = t.qty * t.ent;
                logBody.innerHTML += `
                <tr>
                    <td>${t.date}</td><td>${t.sym}</td><td>₹${posSize.toLocaleString()}</td><td>${t.qty}</td>
                    <td><span class="${t.status==='Win'?'win':(t.status==='Loss'?'loss':'be')}">${t.status}</span></td>
                    <td class="${t.r>=0?'win':'loss'}">${t.r.toFixed(2)}R</td>
                    <td>
                        <button onclick="toggleRF(${t.id})" style="font-size:10px">${t.isRF?'Undo RF':'Risk Free'}</button>
                        <button onclick="closeTrade(${t.id})" style="font-size:10px">Close</button>
                    </td>
                </tr>`;
            });
            buildMatrix();
        }

        function buildMatrix() {
            const data = {};
            trades.forEach(t => {
                const d = new Date(t.date);
                const q = "Q" + (Math.floor(d.getMonth()/3)+1) + " " + d.getFullYear();
                if(!data[q]) data[q] = { entered:0, open:0, closed:0, be:0, win:0, loss:0, sumW:0, sumL:0, totalR:0 };
                
                data[q].entered++;
                if(t.status === 'Open') data[q].open++;
                else {
                    data[q].closed++;
                    if(t.status === 'Win') { data[q].win++; data[q].sumW += t.r; }
                    else if(t.status === 'Loss') { data[q].loss++; data[q].sumL += Math.abs(t.r); }
                    else data[q].be++;
                    data[q].totalR += t.r;
                }
            });

            const qSorted = Object.keys(data).sort().reverse();
            document.getElementById('qHeader').innerHTML = '<th class="label-cell">Metrics View (R Based)</th>' + qSorted.map(q => `<th>${q}</th>`).join('');

            // Formula Logic Improvements
            const rows = [
                { l: "Trades Entered", k: "entered" },
                { l: "Open Till Date", k: "open" },
                { l: "Trades Closed", k: "closed" },
                { l: "Breakeven", k: "be", c: "be" },
                { l: "Winners + Losers", f: q => data[q].win + data[q].loss },
                { l: "Winners", k: "win", c: "win" },
                { l: "Losers", k: "loss", c: "loss" },
                { l: "Win Rate", f: q => (data[q].win / (data[q].win + data[q].loss) * 100 || 0).toFixed(0) + "%" },
                { l: "Avg Loss (Losers)", f: q => (data[q].sumL / data[q].loss || 0).toFixed(2), c: "loss" },
                { l: "Avg Gain (Winners)", f: q => (data[q].sumW / data[q].win || 0).toFixed(2), c: "win" },
                { l: "Avg R Loss (Losers)", f: q => "-" + (data[q].sumL / data[q].loss || 0).toFixed(2), c: "loss" },
                { l: "Avg R Gain (Winners)", f: q => (data[q].sumW / data[q].win || 0).toFixed(2), c: "win" },
                { l: "ARR", f: q => ((data[q].sumW / data[q].win) / (data[q].sumL / data[q].loss) || 0).toFixed(2) },
                { l: "Avg R Loss (BE)", f: q => (0).toFixed(2), c: "be" },
                { l: "Trade Expectancy (in R)", f: q => (data[q].totalR / data[q].closed || 0).toFixed(2), c: "win" },
                { l: "Total R Gained", f: q => data[q].totalR.toFixed(2), c: "win" },
                { l: "Average Risk R", f: q => riskR, isPro: true },
                { l: "Total Profit", f: q => "₹" + Math.floor(data[q].totalR * riskR).toLocaleString(), isPro: true, c: "win" }
            ];

            const mBody = document.getElementById('matrixBody');
            mBody.innerHTML = rows.map(r => `
                <tr class="${r.isPro ? 'highlight-row' : ''}">
                    <td class="label-cell">${r.l}</td>
                    ${qSorted.map(q => `<td class="${r.c || ''}">${r.f ? r.f(q) : data[q][r.k]}</td>`).join('')}
                </tr>
            `).join('');
        }

        function exportExcel() {
            let table = document.getElementById("mainMatrix").outerHTML;
            window.open('data:application/vnd.ms-excel,' + encodeURIComponent(table));
        }

        show('sum');
    </script>
</body>
</html>
